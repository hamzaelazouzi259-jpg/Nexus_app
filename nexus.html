<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0f0c29"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Nexus 🌐</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#0f0c29;font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:#fff;direction:rtl;min-height:100vh;}
  input,textarea,button{font-family:inherit;direction:rtl;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(108,99,255,0.4);border-radius:4px;}
  .page{display:none;} .page.active{display:block;}
  .tab-content{display:none;} .tab-content.active{display:block;}
  .app-wrap{max-width:480px;margin:0 auto;min-height:100vh;position:relative;}

  /* LOGIN */
  #login-page{min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;align-items:center;justify-content:center;}
  .login-box{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px;width:340px;box-shadow:0 25px 50px rgba(0,0,0,0.5);}
  .brand-logo{text-align:center;margin-bottom:32px;}
  .brand-logo .icon{font-size:48px;display:block;margin-bottom:8px;}
  .brand-logo h1{font-size:32px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#6C63FF,#FF6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .brand-logo p{color:rgba(255,255,255,0.5);font-size:14px;margin-top:4px;}
  .tab-switch{display:flex;background:rgba(255,255,255,0.07);border-radius:12px;padding:4px;margin-bottom:24px;}
  .tab-switch button{flex:1;padding:10px 0;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;transition:all 0.3s;background:transparent;color:#fff;}
  .tab-switch button.active{background:rgba(108,99,255,0.8);}
  .field{padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:#fff;font-size:15px;outline:none;width:100%;margin-bottom:14px;}
  .field::placeholder{color:rgba(255,255,255,0.4);}
  .btn-main{width:100%;padding:14px;border-radius:12px;border:none;color:#fff;font-weight:800;font-size:16px;cursor:pointer;transition:opacity 0.2s;}
  .btn-login{background:linear-gradient(135deg,#6C63FF,#9B59B6);}
  .btn-register{background:linear-gradient(135deg,#43C6AC,#191654);}
  .form-section{display:none;} .form-section.active{display:block;}

  /* APP */
  #app-page{display:none;}
  #app-page.active{display:block;}

  /* HEADER */
  .header{position:sticky;top:0;background:rgba(15,12,41,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;z-index:50;}
  .header-brand{font-size:22px;font-weight:800;background:linear-gradient(135deg,#6C63FF,#FF6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .header-right{display:flex;align-items:center;gap:10px;}
  .search-input{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:8px 14px;color:#fff;outline:none;width:120px;font-size:13px;}
  .search-input::placeholder{color:rgba(255,255,255,0.4);}
  .btn-post{background:linear-gradient(135deg,#6C63FF,#9B59B6);border:none;border-radius:20px;padding:8px 14px;color:#fff;font-weight:700;cursor:pointer;font-size:13px;}

  /* NAVBAR */
  .navbar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,12,41,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-around;padding:10px 0 16px;z-index:100;max-width:480px;margin:0 auto;}
  .nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 12px;position:relative;}
  .nav-icon{font-size:22px;transition:all 0.3s;filter:grayscale(80%);}
  .nav-btn.active .nav-icon{filter:none;transform:scale(1.15);}
  .nav-label{font-size:10px;color:rgba(255,255,255,0.4);transition:color 0.3s;}
  .nav-btn.active .nav-label{color:#6C63FF;font-weight:700;}
  .notif-badge{position:absolute;top:-2px;right:6px;background:#FF4757;color:#fff;font-size:10px;font-weight:800;padding:2px 5px;border-radius:10px;}

  /* CONTENT */
  .content{padding-bottom:80px;}

  /* STORIES */
  .stories-wrap{display:flex;gap:12px;padding:16px 16px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .story-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;}
  .story-ring{width:60px;height:60px;border-radius:50%;padding:2px;background:linear-gradient(135deg,#6C63FF,#FF6584);}
  .story-ring.seen{background:rgba(255,255,255,0.15);}
  .story-avatar{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;border:2px solid #0f0c29;}
  .story-add{width:60px;height:60px;border-radius:50%;background:rgba(108,99,255,0.2);border:2px dashed rgba(108,99,255,0.6);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;}
  .story-name{color:rgba(255,255,255,0.6);font-size:11px;text-align:center;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* SUGGESTIONS */
  .suggest-wrap{padding:8px 16px 12px;}
  .suggest-title{color:rgba(255,255,255,0.4);font-size:12px;margin-bottom:10px;}
  .suggest-list{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .suggest-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;min-width:130px;}
  .suggest-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;}
  .suggest-name{color:#fff;font-size:13px;font-weight:600;text-align:center;}
  .suggest-followers{color:rgba(255,255,255,0.4);font-size:11px;}
  .btn-follow{background:linear-gradient(135deg,#6C63FF,#9B59B6);border:none;border-radius:20px;padding:6px 16px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
  .btn-following{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:6px 16px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}

  /* POSTS */
  .posts-list{padding:0 16px;}
  .post-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;overflow:hidden;margin-bottom:16px;}
  .post-header{padding:16px 16px 12px;display:flex;align-items:center;gap:12px;}
  .post-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0;}
  .post-user-info{flex:1;}
  .post-username{color:#fff;font-weight:700;font-size:15px;}
  .post-handle{color:rgba(255,255,255,0.4);font-size:12px;}
  .post-media{background:linear-gradient(135deg,#1a1a2e,#16213e);margin:0 16px;border-radius:16px;height:175px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;position:relative;}
  .post-play{width:56px;height:56px;background:rgba(108,99,255,0.8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;}
  .post-media-label{color:rgba(255,255,255,0.7);font-size:13px;}
  .post-views{position:absolute;bottom:10px;right:14px;color:rgba(255,255,255,0.5);font-size:12px;}
  .post-image{background:linear-gradient(135deg,#f7971e,#ffd200);margin:0 16px;border-radius:16px;height:175px;display:flex;align-items:center;justify-content:center;font-size:56px;}
  .post-text{padding:12px 16px 8px;color:rgba(255,255,255,0.85);font-size:15px;line-height:1.6;}
  .post-actions{padding:8px 16px 16px;display:flex;gap:24px;}
  .action-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;color:rgba(255,255,255,0.5);font-size:14px;font-weight:600;font-family:inherit;}
  .action-icon{font-size:18px;}

  /* REELS TAB */
  .reels-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 16px;}
  .reel-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;cursor:pointer;}
  .reel-thumb{height:160px;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
  .reel-info{padding:10px;}
  .reel-title{color:rgba(255,255,255,0.8);font-size:12px;margin-bottom:6px;line-height:1.4;}
  .reel-meta{color:rgba(255,255,255,0.4);font-size:11px;margin-top:4px;}

  /* MESSAGES */
  .msg-list{padding:0 16px 80px;}
  .msg-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer;}
  .msg-avatar-wrap{position:relative;}
  .msg-avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;}
  .online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:#43C6AC;border-radius:50%;border:2px solid #0f0c29;}
  .msg-info{flex:1;}
  .msg-name-row{display:flex;justify-content:space-between;margin-bottom:2px;}
  .msg-name{color:#fff;font-weight:700;}
  .msg-time{color:rgba(255,255,255,0.3);font-size:12px;}
  .msg-preview{color:rgba(255,255,255,0.45);font-size:13px;}

  /* CHAT */
  #chat-view{display:none;flex-direction:column;height:calc(100vh - 0px);}
  #chat-view.open{display:flex;}
  .chat-header{padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.08);}
  .back-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;}
  .chat-online{color:#43C6AC;font-size:12px;}
  .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
  .bubble-wrap-me{display:flex;justify-content:flex-start;}
  .bubble-wrap-them{display:flex;justify-content:flex-end;}
  .bubble{border-radius:18px;padding:10px 14px;max-width:70%;}
  .bubble-me{background:linear-gradient(135deg,#6C63FF,#9B59B6);border-radius:18px 18px 4px 18px;}
  .bubble-them{background:rgba(255,255,255,0.08);border-radius:18px 18px 18px 4px;}
  .bubble-text{color:#fff;font-size:14px;}
  .bubble-time{color:rgba(255,255,255,0.4);font-size:11px;margin-top:4px;}
  .chat-input-wrap{padding:16px;display:flex;gap:12px;border-top:1px solid rgba(255,255,255,0.08);}
  .chat-field{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:12px 16px;color:#fff;outline:none;font-size:14px;font-family:inherit;}
  .chat-field::placeholder{color:rgba(255,255,255,0.4);}
  .send-btn{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#6C63FF,#9B59B6);border:none;cursor:pointer;font-size:18px;flex-shrink:0;}
  .typing-bubble{background:rgba(255,255,255,0.08);border-radius:18px;padding:10px 16px;color:rgba(255,255,255,0.5);font-size:14px;align-self:flex-end;}

  /* NOTIFICATIONS */
  .notif-list{padding:0 16px 80px;}
  .notif-item{display:flex;align-items:center;gap:14px;padding:14px 12px;margin-bottom:8px;border-radius:16px;border:1px solid rgba(255,255,255,0.05);}
  .notif-item.unread{background:rgba(108,99,255,0.1);border-color:rgba(108,99,255,0.25);}
  .notif-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;flex-shrink:0;}
  .notif-text{flex:1;}
  .notif-name{color:#fff;font-weight:700;}
  .notif-action{color:rgba(255,255,255,0.7);}
  .notif-time{color:rgba(255,255,255,0.35);font-size:12px;margin-top:4px;}
  .unread-dot{width:8px;height:8px;border-radius:50%;background:#6C63FF;flex-shrink:0;}

  /* PROFILE */
  .profile-header{background:linear-gradient(135deg,#302b63,#24243e);padding:32px 24px 24px;position:relative;}
  .logout-btn{position:absolute;top:16px;left:16px;background:rgba(255,255,255,0.1);border:none;border-radius:10px;padding:8px 12px;color:#fff;cursor:pointer;font-size:12px;font-family:inherit;}
  .profile-top{display:flex;align-items:flex-end;gap:16px;margin-bottom:16px;}
  .profile-big-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#6C63FF,#FF6584);display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;font-weight:800;border:3px solid rgba(255,255,255,0.2);}
  .profile-name{color:#fff;font-size:22px;font-weight:800;}
  .profile-handle{color:rgba(255,255,255,0.5);font-size:14px;}
  .profile-bio{color:rgba(255,255,255,0.7);font-size:14px;margin-bottom:16px;}
  .profile-stats{display:flex;gap:24px;margin-bottom:16px;}
  .stat{text-align:center;}
  .stat-num{color:#fff;font-weight:800;font-size:18px;}
  .stat-label{color:rgba(255,255,255,0.5);font-size:12px;}
  .btn-edit{padding:10px 24px;border-radius:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-weight:700;cursor:pointer;font-family:inherit;font-size:14px;}
  .edit-fields{display:flex;flex-direction:column;gap:10px;}
  .edit-field{padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;outline:none;font-size:14px;font-family:inherit;}
  .edit-field::placeholder{color:rgba(255,255,255,0.4);}
  .edit-actions{display:flex;gap:10px;}
  .btn-save{flex:1;padding:10px;border-radius:10px;background:linear-gradient(135deg,#6C63FF,#9B59B6);border:none;color:#fff;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn-cancel{padding:10px 16px;border-radius:10px;background:rgba(255,255,255,0.1);border:none;color:#fff;cursor:pointer;font-family:inherit;}
  .my-posts-section{padding:16px;}
  .my-posts-title{color:#fff;margin-bottom:12px;font-size:16px;}
  .empty-posts{text-align:center;color:rgba(255,255,255,0.4);padding:40px;}
  .btn-post-now{margin-top:16px;background:linear-gradient(135deg,#6C63FF,#9B59B6);border:none;border-radius:20px;padding:10px 24px;color:#fff;cursor:pointer;font-weight:700;font-family:inherit;}

  /* POST MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:flex-end;z-index:200;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:#1a1730;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:480px;margin:0 auto;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .modal-title{color:#fff;font-size:18px;font-weight:700;}
  .modal-close{background:rgba(255,255,255,0.1);border:none;border-radius:50%;width:32px;height:32px;color:#fff;cursor:pointer;font-size:16px;}
  .post-types{display:flex;gap:8px;margin-bottom:16px;}
  .type-btn{flex:1;padding:8px 4px;border-radius:10px;border:none;background:rgba(255,255,255,0.07);color:#fff;cursor:pointer;font-size:12px;font-family:inherit;}
  .type-btn.active{background:rgba(108,99,255,0.7);font-weight:700;}
  .modal-body{display:flex;gap:12px;margin-bottom:16px;}
  .modal-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;flex-shrink:0;}
  .post-textarea{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:14px;color:#fff;resize:none;outline:none;font-size:14px;line-height:1.6;font-family:inherit;height:100px;}
  .post-textarea::placeholder{color:rgba(255,255,255,0.4);}
  .btn-publish{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#6C63FF,#9B59B6);color:#fff;font-weight:800;font-size:16px;cursor:pointer;font-family:inherit;}
  .btn-publish:disabled{background:rgba(108,99,255,0.4);cursor:not-allowed;}

  /* STORY VIEWER */
  .story-viewer{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:24px;}
  .story-viewer.open{display:flex;}
  .story-close-hint{color:rgba(255,255,255,0.5);font-size:14px;}
  .story-card{width:80%;max-width:320px;height:500px;border-radius:20px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}

  /* TAB SECTION HEADERS */
  .section-title{color:#fff;font-size:22px;font-weight:800;margin-bottom:16px;padding:16px 16px 0;}
</style>
</head>
<body>

<!-- ════ LOGIN PAGE ════ -->
<div id="login-page" class="page active">
  <div style="min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;align-items:center;justify-content:center;">
    <div class="login-box">
      <div class="brand-logo">
        <span class="icon">🌐</span>
        <h1>Nexus</h1>
        <p>شبكتك الاجتماعية الشاملة</p>
      </div>
      <div class="tab-switch">
        <button class="active" onclick="switchAuth('login')">تسجيل الدخول</button>
        <button onclick="switchAuth('register')">إنشاء حساب</button>
      </div>
      <!-- Login Form -->
      <div id="form-login" class="form-section active">
        <input id="login-username" class="field" type="text" placeholder="اسم المستخدم"/>
        <input id="login-password" class="field" type="password" placeholder="كلمة المرور"/>
        <button class="btn-main btn-login" onclick="handleLogin()">دخول 🚀</button>
      </div>
      <!-- Register Form -->
      <div id="form-register" class="form-section">
        <input id="reg-name" class="field" type="text" placeholder="الاسم الكامل"/>
        <input id="reg-username" class="field" type="text" placeholder="اسم المستخدم"/>
        <input id="reg-password" class="field" type="password" placeholder="كلمة المرور"/>
        <button class="btn-main btn-register" onclick="handleRegister()">إنشاء حساب ✨</button>
      </div>
    </div>
  </div>
</div>

<!-- ════ APP PAGE ════ -->
<div id="app-page" class="page">
  <div class="app-wrap">

    <!-- HEADER -->
    <div class="header">
      <div class="header-brand">🌐 Nexus</div>
      <div class="header-right">
        <input class="search-input" type="text" placeholder="ابحث..."/>
        <button class="btn-post" onclick="openPostModal()">+ نشر</button>
      </div>
    </div>

    <!-- HOME TAB -->
    <div id="tab-home" class="tab-content active content">
      <!-- Stories -->
      <div class="stories-wrap" id="stories-container"></div>
      <!-- Suggestions -->
      <div class="suggest-wrap">
        <p class="suggest-title">مقترح للمتابعة</p>
        <div class="suggest-list" id="suggest-container"></div>
      </div>
      <!-- Posts -->
      <div class="posts-list" id="posts-container"></div>
    </div>

    <!-- REELS TAB -->
    <div id="tab-reels" class="tab-content content">
      <div class="section-title">🎬 الفيديوهات</div>
      <div class="reels-grid" id="reels-container"></div>
    </div>

    <!-- MESSAGES TAB -->
    <div id="tab-messages" class="tab-content content">
      <!-- Message List -->
      <div id="msg-list-view">
        <div class="section-title">💬 الرسائل</div>
        <div class="msg-list" id="msg-list-container"></div>
      </div>
      <!-- Chat View -->
      <div id="chat-view">
        <div class="chat-header">
          <button class="back-btn" onclick="closeChat()">←</button>
          <div id="chat-avatar" class="msg-avatar" style="width:40px;height:40px;font-size:15px;"></div>
          <div>
            <div id="chat-name" style="color:#fff;font-weight:700;"></div>
            <div class="chat-online">متصل الآن</div>
          </div>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-wrap">
          <input id="chat-input" class="chat-field" type="text" placeholder="اكتب رسالة..." onkeydown="if(event.key==='Enter')sendMessage()"/>
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>

    <!-- NOTIFICATIONS TAB -->
    <div id="tab-notifications" class="tab-content content">
      <div class="section-title">🔔 الإشعارات</div>
      <div class="notif-list" id="notif-container"></div>
    </div>

    <!-- PROFILE TAB -->
    <div id="tab-profile" class="tab-content content">
      <div class="profile-header">

function openChat(userId){
  activeChatId=userId;
  const u=getUser(userId);
  document.getElementById('msg-list-view').style.display='none';
  const cv=document.getElementById('chat-view');
  cv.classList.add('open');
  const ca=document.getElementById('chat-avatar');
  ca.style.background=u?.color||'#6C63FF';
  ca.textContent=u?.avatar||'؟';
  document.getElementById('chat-name').textContent=u?.name||'';
  renderChatMessages();
}

function closeChat(){
  activeChatId=null;
  document.getElementById('msg-list-view').style.display='block';
  document.getElementById('chat-view').classList.remove('open');
}

function renderChatMessages(){
  const msgs=MESSAGES[activeChatId]||[];
  const c=document.getElementById('chat-messages');
  c.innerHTML=msgs.map(m=>`
    <div class="bubble-wrap-${m.from==='me'?'me':'them'}">
      <div class="bubble bubble-${m.from==='me'?'me':'them'}">
        <div class="bubble-text">${m.text}</div>
        <div class="bubble-time">${m.time}</div>
      </div>
    </div>`).join('');
  c.scrollTop=c.scrollHeight;
}

async function sendMessage(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text||!activeChatId)return;
  const time=nowTime();
  if(!MESSAGES[activeChatId])MESSAGES[activeChatId]=[];
  MESSAGES[activeChatId].push({from:"me",text,time});
  input.value='';
  renderChatMessages();
  renderMessages();
  // typing indicator
  const c=document.getElementById('chat-messages');
  const typing=document.createElement('div');
  typing.className='bubble-wrap-them';
  typing.innerHTML='<div class="typing-bubble">يكتب...</div>';
  c.appendChild(typing);
  c.scrollTop=c.scrollHeight;
  // AI reply
  try{
    const u=getUser(activeChatId);
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`أنت ${u?.name||'صديق'}، رد على هذه الرسالة بشكل طبيعي وودود باللغة العربية في جملة أو جملتين فقط: "${text}"`}]})
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||"😊";
    typing.remove();
    MESSAGES[activeChatId].push({from:"them",text:reply,time:nowTime()});
    renderChatMessages();
    renderMessages();
  }catch{typing.remove();}
}

  document.getElementById('stat-followers').textContent=currentUser.followers;
  document.getElementById('stat-following').textContent=followedUsers.length;
  document.getElementById('my-posts-title').textContent=`منشوراتي (${myPosts.length})`;
  renderMyPosts();
}

function renderMyPosts(){
  const myPosts=POSTS.filter(p=>p.userId===99);
  const c=document.getElementById('my-posts-container');
  if(!myPosts.length){
    c.innerHTML=`<div class="empty-posts">لم تنشر شيئاً بعد<br/><button class="btn-post-now" onclick="openPostModal()">أنشر الآن</button></div>`;
    return;
  }
  c.innerHTML=myPosts.map(postCardHTML).join('');
}

function toggleEditProfile(show){
  document.getElementById('profile-view-mode').style.display=show?'none':'block';
  document.getElementById('profile-edit-mode').style.display=show?'block':'none';
  if(show){
    document.getElementById('edit-name').value=currentUser.name;
    document.getElementById('edit-username').value=currentUser.username;
    document.getElementById('edit-bio').value=currentUser.bio;
  }
}

function saveProfile(){
  currentUser.name=document.getElementById('edit-name').value||currentUser.name;
  currentUser.username=document.getElementById('edit-username').value||currentUser.username;
  currentUser.bio=document.getElementById('edit-bio').value||currentUser.bio;
  currentUser.avatar=currentUser.name[0];
  toggleEditProfile(false);
  renderProfile();
}

// ════════════════════════════════════════
// POST MODAL
// ════════════════════════════════════════
function openPostModal(){
  document.getElementById('post-modal').classList.add('open');
  document.getElementById('post-textarea').focus();
}
function closePostModal(){
  document.getElementById('post-modal').classList.remove('open');
  document.getElementById('post-textarea').value='';
}
function setPostType(type,btn){
  currentPostType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

async function publishPost(){
  const text=document.getElementById('post-textarea').value.trim();
  if(!text)return;
  const btn=document.getElementById('publish-btn');
  btn.disabled=true;
  btn.textContent='🤖 يحسّن المنشور...';
  let enhanced=text;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`أنت مساعد لشبكة اجتماعية. المستخدم نشر: "${text}". رد بـ JSON فقط بدون backticks: {"enhanced": "نسخة محسّنة وجذابة من المنشور مع إيموجي مناسبة"}`}]})
    });
    const data=await res.json();
    const t=data.content?.[0]?.text||"";
    try{enhanced=JSON.parse(t).enhanced||text;}catch{}
  }catch{}
  const post={
    id:Date.now(),userId:99,type:currentPostType,content:enhanced,
    likes:0,comments:0,shares:0,time:"الآن",liked:false,
    duration:currentPostType==='reel'?'0:30':currentPostType==='video_long'?'5:00':null,
    views:'0'
  };
  POSTS.unshift(post);
  btn.disabled=false;
  btn.textContent='نشر الآن ✨';
  closePostModal();
  renderPosts();
  renderReels();
  renderProfile();
}

// Enter key support
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('login-page').classList.contains('active')){
    if(document.getElementById('form-login').classList.contains('active'))handleLogin();
    else handleRegister();
  }
});
</script>
