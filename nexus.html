<style>
:root{
  --bg:#080612;--bg2:#0f0b1e;--bg3:#16112a;--card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);--accent:#7C3AED;--accent2:#EC4899;
  --accent3:#06B6D4;--text:#fff;--sub:rgba(255,255,255,0.5);
  --green:#10B981;--red:#EF4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'Cairo',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
input,textarea,button,select{font-family:'Cairo',sans-serif;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px;}

/* ── LOADING ── */
#ld{position:fixed;inset:0;background:linear-gradient(135deg,#080612,#1a0533);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999;}
#ld .logo{font-size:56px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
.spin{width:36px;height:36px;border:3px solid rgba(124,58,237,0.2);border-top-color:#7C3AED;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── PAGES ── */
.pg{display:none;}.pg.on{display:block;}
#app-pg.on{display:flex;flex-direction:column;min-height:100vh;}

/* ── AUTH ── */
#auth-pg{min-height:100vh;background:linear-gradient(160deg,#080612 0%,#1a0533 50%,#080612 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{width:100%;max-width:380px;}
.auth-brand{text-align:center;margin-bottom:36px;}
.auth-brand .nx-logo{font-size:52px;margin-bottom:10px;display:block;}
.auth-brand h1{font-size:34px;font-weight:900;background:linear-gradient(135deg,#7C3AED,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.auth-brand p{color:var(--sub);font-size:14px;margin-top:4px;}
.auth-card{background:rgba(255,255,255,0.04);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.09);border-radius:24px;padding:32px;box-shadow:0 32px 64px rgba(0,0,0,0.6);}
.seg{display:flex;background:rgba(255,255,255,0.06);border-radius:14px;padding:4px;margin-bottom:24px;gap:4px;}
.seg-btn{flex:1;padding:10px;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;color:var(--sub);background:transparent;transition:all .3s;}
.seg-btn.on{background:linear-gradient(135deg,#7C3AED,#6D28D9);color:#fff;box-shadow:0 4px 12px rgba(124,58,237,0.4);}
.inp{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--border);background:rgba(255,255,255,0.05);color:#fff;font-size:15px;outline:none;margin-bottom:14px;transition:border-color .3s;}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:rgba(255,255,255,0.3);}
.auth-btn{width:100%;padding:15px;border-radius:14px;border:none;font-weight:900;font-size:16px;cursor:pointer;transition:all .3s;margin-top:4px;}
.btn-login{background:linear-gradient(135deg,#7C3AED,#6D28D9);color:#fff;box-shadow:0 6px 20px rgba(124,58,237,0.4);}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,58,237,0.5);}
.btn-reg{background:linear-gradient(135deg,#EC4899,#BE185D);color:#fff;box-shadow:0 6px 20px rgba(236,72,153,0.4);}
.f-sec{display:none;}.f-sec.on{display:block;}
.alert{padding:11px 14px;border-radius:12px;font-size:13px;margin-bottom:14px;display:none;font-weight:600;}
.alert-err{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5;}
.alert-ok{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:#6EE7B7;}

/* ── APP LAYOUT ── */
.app-wrap{max-width:480px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:100;background:rgba(8,6,18,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.hdr-logo{font-size:20px;font-weight:900;background:linear-gradient(135deg,#7C3AED,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.srch{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:20px;padding:8px 14px;color:#fff;outline:none;width:110px;font-size:13px;transition:width .3s;}
.srch:focus{width:150px;border-color:var(--accent);}
.srch::placeholder{color:rgba(255,255,255,0.3);}
.hdr-post-btn{background:linear-gradient(135deg,#7C3AED,#EC4899);border:none;border-radius:20px;padding:8px 16px;color:#fff;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap;}

/* ── TABS ── */
.tab-c{display:none;flex:1;overflow-y:auto;padding-bottom:80px;}.tab-c.on{display:block;}

/* ── NAVBAR ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(8,6,18,0.96);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 18px;z-index:100;}
.nb{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 14px;position:relative;}
.ni{font-size:22px;transition:all .25s;filter:grayscale(1) opacity(0.5);}
.nb.on .ni{filter:none;transform:scale(1.18);}
.nl{font-size:10px;color:rgba(255,255,255,0.35);transition:color .25s;}
.nb.on .nl{color:var(--accent);font-weight:700;}
.bdg{position:absolute;top:0;right:8px;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:8px;display:none;}

/* ── STORIES ── */
.stories{display:flex;gap:14px;padding:14px 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.stories::-webkit-scrollbar{display:none;}
.st-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;}
.st-ring{width:62px;height:62px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,#7C3AED,#EC4899,#06B6D4);}
.st-ring.seen{background:rgba(255,255,255,0.12);}
.st-in{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:19px;border:2px solid var(--bg);}
.st-add{width:62px;height:62px;border-radius:50%;background:rgba(124,58,237,0.15);border:2px dashed rgba(124,58,237,0.5);display:flex;align-items:center;justify-content:center;font-size:24px;}
.st-name{color:var(--sub);font-size:11px;max-width:64px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── SUGGEST ── */
.sug-wrap{padding:6px 16px 14px;}
.sug-title{color:rgba(255,255,255,0.35);font-size:12px;margin-bottom:10px;font-weight:600;}
.sug-list{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sug-list::-webkit-scrollbar{display:none;}
.sug-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;min-width:118px;}
.sug-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:17px;}
.sug-nm{color:#fff;font-size:12px;font-weight:700;text-align:center;}
.sug-fl{color:var(--sub);font-size:11px;}
.f-btn{background:linear-gradient(135deg,#7C3AED,#EC4899);border:none;border-radius:20px;padding:6px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
.f-btn.ing{background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--sub);}

/* ── POST CARD ── */
.posts-wrap{padding:0 14px;}
.post{background:var(--card);border:1px solid var(--border);border-radius:22px;overflow:hidden;margin-bottom:16px;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.post-hd{padding:14px 14px 10px;display:flex;align-items:center;gap:10px;}
.p-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:16px;flex-shrink:0;overflow:hidden;}
.p-av img{width:100%;height:100%;object-fit:cover;}
.p-ui{flex:1;}
.p-nm{color:#fff;font-weight:700;font-size:14px;}
.p-hd{color:var(--sub);font-size:12px;}
.p-media{margin:0 14px;border-radius:16px;overflow:hidden;max-height:320px;}
.p-media img{width:100%;height:100%;object-fit:cover;display:block;}
.p-media-placeholder{background:linear-gradient(135deg,#1a0533,#0f0b1e);height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;}
.p-play{width:54px;height:54px;background:rgba(124,58,237,0.8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
.p-txt{padding:10px 14px 6px;color:rgba(255,255,255,0.88);font-size:14px;line-height:1.65;}
.p-acts{padding:6px 14px 14px;display:flex;gap:22px;align-items:center;}
.act{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--sub);font-size:13px;font-weight:600;font-family:'Cairo',sans-serif;transition:color .2s;}
.act:hover{color:#fff;}
.act.liked{color:#EF4444;}
.act-ic{font-size:19px;}

/* ── SECTION TITLE ── */
.sec-t{color:#fff;font-size:19px;font-weight:900;padding:16px 16px 10px;}

/* ── REELS GRID ── */
.reels-g{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px 14px;}
.reel-c{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer;transition:transform .2s;}
.reel-c:active{transform:scale(0.97);}
.reel-th{height:155px;background:linear-gradient(135deg,#1a0533,#0f0b1e);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;position:relative;}
.reel-th img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.reel-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;}
.reel-inf{padding:10px;}
.reel-tt{color:rgba(255,255,255,0.85);font-size:12px;margin-bottom:5px;line-height:1.4;}
.reel-mt{color:var(--sub);font-size:11px;}

/* ── MESSAGES ── */
.msg-list{padding:0 14px 80px;}
.msg-it{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s;}
.m-aw{position:relative;}
.m-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:18px;overflow:hidden;}
.m-av img{width:100%;height:100%;object-fit:cover;}
.odot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:var(--green);border-radius:50%;border:2px solid var(--bg);}

/* ── CHAT ── */
#chat-v{display:none;flex-direction:column;height:100vh;position:fixed;inset:0;z-index:200;background:var(--bg);}
#chat-v.on{display:flex;}
.ch-hd{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:rgba(8,6,18,0.95);backdrop-filter:blur(20px);}
.bk-btn{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 4px;}
.ch-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.bw-me{display:flex;justify-content:flex-start;}
.bw-th{display:flex;justify-content:flex-end;}
.bbl{border-radius:18px;padding:10px 14px;max-width:75%;}
.b-me{background:linear-gradient(135deg,#7C3AED,#6D28D9);border-radius:18px 18px 5px 18px;}
.b-th{background:rgba(255,255,255,0.08);border-radius:18px 18px 18px 5px;}
.bbl-txt{color:#fff;font-size:14px;line-height:1.5;}
.bbl-t{color:rgba(255,255,255,0.35);font-size:11px;margin-top:4px;}
.ch-inp-w{padding:12px 16px;display:flex;gap:10px;border-top:1px solid var(--border);background:rgba(8,6,18,0.95);}
.ch-f{flex:1;background:rgba(255,255,255,0.07);border:1.5px solid var(--border);border-radius:24px;padding:12px 16px;color:#fff;outline:none;font-size:14px;font-family:'Cairo',sans-serif;transition:border-color .3s;}
.ch-f:focus{border-color:var(--accent);}
.ch-f::placeholder{color:rgba(255,255,255,0.3);}
.s-btn{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#EC4899);border:none;cursor:pointer;font-size:17px;flex-shrink:0;}

/* ── NOTIFS ── */
.not-list{padding:0 14px 80px;}
.not-it{display:flex;align-items:center;gap:12px;padding:13px;margin-bottom:8px;border-radius:16px;border:1px solid var(--border);transition:all .2s;}
.not-it.unr{background:rgba(124,58,237,0.08);border-color:rgba(124,58,237,0.2);}
.not-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:16px;flex-shrink:0;overflow:hidden;}
.not-av img{width:100%;height:100%;object-fit:cover;}
.u-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}

/* ── PROFILE ── */
.prof-hd{background:linear-gradient(160deg,#1a0533,var(--bg2));padding:28px 18px 20px;position:relative;}
.lout-btn{position:absolute;top:14px;left:14px;background:rgba(255,255,255,0.08);border:1px solid var(--border);border-radius:12px;padding:7px 12px;color:#fff;cursor:pointer;font-size:12px;font-family:'Cairo',sans-serif;}
.p-b-av{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:900;border:3px solid rgba(255,255,255,0.15);overflow:hidden;cursor:pointer;position:relative;}
.p-b-av img{width:100%;height:100%;object-fit:cover;}
.p-b-av .av-edit{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;font-size:20px;}
.p-b-av:hover .av-edit{display:flex;}
.e-f{width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid var(--border);background:rgba(255,255,255,0.06);color:#fff;outline:none;font-size:14px;font-family:'Cairo',sans-serif;margin-bottom:10px;transition:border-color .3s;}
.e-f:focus{border-color:var(--accent);}
.e-f::placeholder{color:rgba(255,255,255,0.3);}
.s-btn2{flex:1;padding:10px;border-radius:12px;background:linear-gradient(135deg,#7C3AED,#EC4899);border:none;color:#fff;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;}
.c-btn{padding:10px 14px;border-radius:12px;background:rgba(255,255,255,0.07);border:none;color:#fff;cursor:pointer;font-family:'Cairo',sans-serif;}

/* ── POST MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:flex-end;justify-content:center;z-index:300;}
.ov.on{display:flex;}
.m-box{background:#100d1f;border-radius:26px 26px 0 0;padding:22px;width:100%;max-width:480px;}
.m-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.m-close{background:rgba(255,255,255,0.08);border:none;border-radius:50%;width:30px;height:30px;color:#fff;cursor:pointer;font-size:15px;}
.pt-btns{display:flex;gap:8px;margin-bottom:14px;}
.pt-btn{flex:1;padding:8px 4px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;}
.pt-btn.on{background:linear-gradient(135deg,rgba(124,58,237,0.4),rgba(236,72,153,0.3));border-color:var(--accent);color:#fff;font-weight:700;}
.m-body{display:flex;gap:10px;margin-bottom:14px;}
.m-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:17px;flex-shrink:0;overflow:hidden;}
.m-av img{width:100%;height:100%;object-fit:cover;}
.p-ta{flex:1;background:rgba(255,255,255,0.06);border:1.5px solid var(--border);border-radius:16px;padding:12px;color:#fff;resize:none;outline:none;font-size:14px;line-height:1.6;font-family:'Cairo',sans-serif;height:95px;transition:border-color .3s;}
.p-ta:focus{border-color:var(--accent);}
.p-ta::placeholder{color:rgba(255,255,255,0.3);}
/* image preview in modal */
.img-preview{margin-bottom:12px;border-radius:14px;overflow:hidden;display:none;max-height:200px;}
.img-preview img{width:100%;object-fit:cover;display:block;}
.img-pick-row{display:flex;gap:10px;margin-bottom:14px;}
.img-pick-btn{flex:1;padding:10px;border-radius:12px;border:1px dashed var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:13px;font-family:'Cairo',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
.pub-btn{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff;font-weight:900;font-size:15px;cursor:pointer;font-family:'Cairo',sans-serif;box-shadow:0 6px 20px rgba(124,58,237,0.4);transition:all .3s;}
.pub-btn:disabled{background:rgba(124,58,237,0.3);box-shadow:none;cursor:not-allowed;}

/* ── STORY VIEWER ── */
.sv{position:fixed;inset:0;background:#000;z-index:400;display:none;align-items:center;justify-content:center;flex-direction:column;}
.sv.on{display:flex;}
.sv-card{width:90%;max-width:340px;height:520px;border-radius:24px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;position:relative;overflow:hidden;}
.sv-card img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.sv-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);}
.sv-info{position:absolute;bottom:20px;text-align:center;}
.sv-prog{position:absolute;top:12px;left:12px;right:12px;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;overflow:hidden;}
.sv-prog-fill{height:100%;background:#fff;border-radius:2px;animation:story-prog 4s linear forwards;}
@keyframes story-prog{from{width:0;}to{width:100%;}}

/* ── EMPTY ── */
.empty-s{text-align:center;color:var(--sub);padding:40px 20px;}
.empty-s .e-ic{font-size:48px;margin-bottom:12px;display:block;}
.btn-pnow{margin-top:14px;background:linear-gradient(135deg,#7C3AED,#EC4899);border:none;border-radius:20px;padding:10px 24px;color:#fff;cursor:pointer;font-weight:700;font-family:'Cairo',sans-serif;}

/* ── UPLOAD PROGRESS ── */
.up-bar{height:3px;background:linear-gradient(90deg,#7C3AED,#EC4899);border-radius:2px;transition:width .3s;width:0;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="ld">
  <span class="logo">🌐</span>
  <div class="spin"></div>
  <span style="color:var(--sub);font-size:14px;">جاري التحميل...</span>
</div>

<!-- ════ AUTH ════ -->
<div id="auth-pg" class="pg">
  <div class="auth-brand">
    <span class="nx-logo">🌐</span>
    <h1>Nexus</h1>
    <p>شبكتك الاجتماعية الشاملة</p>
  </div>
  <div class="auth-card">
    <div class="seg">
      <button class="seg-btn on" onclick="switchAuth('login')">تسجيل الدخول</button>
      <button class="seg-btn" onclick="switchAuth('reg')">حساب جديد</button>

  <div style="color:rgba(255,255,255,0.4);font-size:13px;margin-bottom:12px;">اضغط للإغلاق</div>

<script>
// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let CU=null,CP=null,POSTS=[],NOTIFS=[],MSGS={},FOLLOWS=new Set(),PROFS={},ACH=null,curPT='text',postImgFile=null;
const COLS=['#7C3AED','#EC4899','#06B6D4','#F59E0B','#10B981','#EF4444'];
const fmtN=n=>n>=1000?(n/1000).toFixed(1)+'K':String(n);
const nowT=()=>new Date().toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});
const tAgo=ts=>{if(!ts)return'';const d=(Date.now()-new Date(ts))/1000;if(d<60)return'الآن';if(d<3600)return`${Math.floor(d/60)} د`;if(d<86400)return`${Math.floor(d/3600)} س`;return`${Math.floor(d/86400)} ي`;};
const pOf=id=>id===CU?.id?CP:(PROFS[id]||{full_name:'مستخدم',username:'user',avatar_color:'#7C3AED'});
const pickC=id=>COLS[parseInt((id||'0').replace(/-/g,'').slice(0,4),16)%COLS.length];

function avHTML(id,sz=42){
  const p=pOf(id);
  const col=p.avatar_color||pickC(id);
  const letter=(p.full_name||'م')[0];
  if(p.avatar_url) return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;overflow:hidden;flex-shrink:0;"><img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;"/></div>`;
  return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:${Math.round(sz*.38)}px;flex-shrink:0;">${letter}</div>`;
}

function showErr(m){const e=document.getElementById('a-err');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',4000);}
function showOk(m){const e=document.getElementById('a-ok');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',4000);}

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
window.addEventListener('DOMContentLoaded',async()=>{
  try{
    const{data:{session}}=await db.auth.getSession();
    if(session){CU=session.user;await loadCP();hideLd();launchApp();}
    else{hideLd();document.getElementById('auth-pg').classList.add('on');}
  }catch(e){hideLd();document.getElementById('auth-pg').classList.add('on');}
});
const hideLd=()=>document.getElementById('ld').style.display='none';

// ══════════════════════════════════
// AUTH
// ══════════════════════════════════
function switchAuth(m){
  document.querySelectorAll('.seg-btn').forEach((b,i)=>b.classList.toggle('on',(m==='login'&&i===0)||(m==='reg'&&i===1)));
  document.getElementById('f-login').classList.toggle('on',m==='login');
  document.getElementById('f-reg').classList.toggle('on',m==='reg');
}

async function doLogin(){
  const em=document.getElementById('l-em').value.trim(),pw=document.getElementById('l-pw').value;
  if(!em||!pw){showErr('يرجى إدخال البريد وكلمة المرور');return;}
  const btn=document.querySelector('.btn-login');btn.textContent='جاري الدخول...';btn.disabled=true;
  try{
    const{data,error}=await db.auth.signInWithPassword({email:em,password:pw});
    if(error)throw error;
    CU=data.user;await loadCP();
    document.getElementById('auth-pg').classList.remove('on');
    launchApp();
  }catch(e){showErr('خطأ في الدخول: '+e.message);}
  btn.textContent='دخول 🚀';btn.disabled=false;
}

async function doRegister(){
  const nm=document.getElementById('r-nm').value.trim();
  const un=document.getElementById('r-un').value.trim().replace(/\s/g,'').toLowerCase();
  const em=document.getElementById('r-em').value.trim();
  const pw=document.getElementById('r-pw').value;
  if(!nm||!un||!em||!pw){showErr('يرجى ملء جميع الحقول');return;}
  if(pw.length<6){showErr('كلمة المرور 6 أحرف على الأقل');return;}
  if(!/^[a-z0-9_]+$/.test(un)){showErr('اسم المستخدم: أحرف إنجليزية وأرقام فقط');return;}
  const btn=document.querySelector('.btn-reg');btn.textContent='جاري الإنشاء...';btn.disabled=true;
  try{
    const{data,error}=await db.auth.signUp({email:em,password:pw,options:{data:{full_name:nm}}});
    if(error)throw error;
    CU=data.user||data.session?.user;
    if(!CU){showOk('✅ تم إنشاء الحساب! تحقق من بريدك للتأكيد ثم سجّل الدخول');btn.textContent='إنشاء حساب ✨';btn.disabled=false;return;}
    const col=COLS[Math.floor(Math.random()*COLS.length)];
    await db.from('profiles').upsert({id:CU.id,username:un,full_name:nm,bio:'',avatar_color:col,followers_count:0,following_count:0});
    await loadCP();
    document.getElementById('auth-pg').classList.remove('on');
    launchApp();
  }catch(e){showErr('خطأ: '+e.message);}
  btn.textContent='إنشاء حساب ✨';btn.disabled=false;
}

async function doLogout(){
  await db.auth.signOut();
  CU=CP=null;POSTS=[];NOTIFS=[];MSGS={};FOLLOWS=new Set();PROFS={};
  document.getElementById('app-pg').classList.remove('on');
  document.getElementById('auth-pg').classList.add('on');
  switchTab('home');
}

// ══════════════════════════════════
// LOAD DATA
// ══════════════════════════════════
async function loadCP(){
  const{data}=await db.from('profiles').select('*').eq('id',CU.id).single();
  CP=data||{id:CU.id,full_name:CU.user_metadata?.full_name||CU.email?.split('@')[0]||'مستخدم',username:CU.email?.split('@')[0]||'user',bio:'',avatar_color:'#7C3AED',followers_count:0,following_count:0};
}
async function loadAllProfs(){const{data}=await db.from('profiles').select('*');(data||[]).forEach(p=>PROFS[p.id]=p);}
async function loadFollows(){const{data}=await db.from('follows').select('following_id').eq('follower_id',CU.id);FOLLOWS=new Set((data||[]).map(r=>r.following_id));}
async function loadPosts(){
  const{data}=await db.from('posts').select('*').order('created_at',{ascending:false}).limit(50);
  const{data:lk}=await db.from('likes').select('post_id').eq('user_id',CU.id);
  const ls=new Set((lk||[]).map(l=>l.post_id));
  POSTS=(data||[]).map(p=>({...p,liked:ls.has(p.id)}));
}
async function loadNotifs(){
  const{data}=await db.from('notifications').select('*').eq('user_id',CU.id).order('created_at',{ascending:false}).limit(30);
  NOTIFS=data||[];renderNotifs();updateBdg();
}

// ══════════════════════════════════
// LAUNCH
// ══════════════════════════════════
async function launchApp(){
  document.getElementById('app-pg').classList.add('on');
  updMAv();
  await Promise.all([loadAllProfs(),loadFollows(),loadPosts()]);
  renderAll();
  // realtime new posts
  db.channel('posts-ch').on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},payload=>{
    if(payload.new.user_id!==CU.id){POSTS.unshift({...payload.new,liked:false});renderPosts();}
  }).subscribe();
}

function updMAv(){
  const el=document.getElementById('m-av');if(!el||!CP)return;
  if(CP.avatar_url){el.innerHTML=`<img src="${CP.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`;el.style.background='none';}
  else{el.textContent=(CP.full_name||'م')[0];el.style.background=CP.avatar_color||'#7C3AED';}
  // also update profile big avatar
  const pb=document.getElementById('p-b-av');
  if(pb){
    if(CP.avatar_url){pb.innerHTML=`<img src="${CP.avatar_url}" style="width:100%;height:100%;object-fit:cover;"/><div class="av-edit">✏️</div>`;}
    else{pb.innerHTML=`<div class="av-edit">✏️</div><span style="font-size:28px;font-weight:900;color:#fff;z-index:1;">${(CP.full_name||'م')[0]}</span>`;pb.style.background=CP.avatar_color||'#7C3AED';}
  }
}

// ══════════════════════════════════
// TABS
// ══════════════════════════════════
function switchTab(n){
  document.querySelectorAll('.tab-c').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('t-'+n).classList.add('on');
  document.getElementById('nb-'+n).classList.add('on');
  if(n==='notifs'){markRead();}
  if(n==='prof'){renderProf();}
  if(n==='msgs'){closeChat();renderMsgList();}
}

function renderAll(){renderStories();renderSuggest();renderPosts();renderReels();renderMsgList();renderNotifs();renderProf();updateBdg();}

// ══════════════════════════════════
// STORIES
// ══════════════════════════════════
function renderStories(){
  const c=document.getElementById('stories-row');
  let h=`<div class="st-item" onclick="openModal()"><div class="st-add">➕</div><span class="st-name">قصتي</span></div>`;
  Object.values(PROFS).filter(p=>p.id!==CU?.id).slice(0,7).forEach(p=>{
    const av=p.avatar_url?`<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`:`${(p.full_name||'م')[0]}`;
    h+=`<div class="st-item" onclick="openSV('${p.id}','${p.avatar_url||''}','${p.full_name||''}','${p.avatar_color||'#7C3AED'}')">
      <div class="st-ring"><div class="st-in" style="background:${p.avatar_url?'transparent':p.avatar_color||'#7C3AED'}">${av}</div></div>
      <span class="st-name">${(p.full_name||'').split(' ')[0]}</span></div>`;
  });
  c.innerHTML=h;
}
function openSV(id,imgUrl,nm,col){
  const card=document.getElementById('sv-card');
  document.getElementById('sv-nm').textContent=nm;
  if(imgUrl){card.innerHTML=`<div class="sv-prog"><div class="sv-prog-fill"></div></div><img src="${imgUrl}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:24px;"/><div class="sv-overlay"></div><div class="sv-info" style="position:absolute;bottom:20px;"><div style="color:#fff;font-weight:900;font-size:17px;">${nm}</div></div>`;}
  else{card.style.background=`linear-gradient(135deg,${col},#0f0b1e)`;card.innerHTML=`<div class="sv-prog"><div class="sv-prog-fill"></div></div><span style="font-size:56px;">✨</span><div class="sv-overlay"></div><div class="sv-info" style="position:absolute;bottom:20px;"><div style="color:#fff;font-weight:900;font-size:17px;">${nm}</div></div>`;}
  document.getElementById('sv').classList.add('on');
  setTimeout(()=>closeSV(),4000);
}
function closeSV(){document.getElementById('sv').classList.remove('on');}

// ══════════════════════════════════
// SUGGEST
// ══════════════════════════════════
function renderSuggest(){
  const c=document.getElementById('sug-list');
  const list=Object.values(PROFS).filter(p=>p.id!==CU?.id&&!FOLLOWS.has(p.id)).slice(0,5);
  if(!list.length){c.innerHTML='<span style="color:var(--sub);font-size:13px;">أنت تتابع الجميع 🎉</span>';return;}
  c.innerHTML=list.map(p=>{
    const av=p.avatar_url?`<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`:`${(p.full_name||'م')[0]}`;
    return`<div class="sug-card"><div class="sug-av" style="background:${p.avatar_url?'transparent':p.avatar_color||'#7C3AED'}">${av}</div><div class="sug-nm">${p.full_name||''}</div><div class="sug-fl">${fmtN(p.followers_count||0)} متابع</div><button class="f-btn" id="fb-${p.id}" onclick="toggleFollow('${p.id}')">متابعة +</button></div>`;
  }).join('');
}
async function toggleFollow(id){
  const btn=document.getElementById('fb-'+id);
  if(FOLLOWS.has(id)){
    await db.from('follows').delete().eq('follower_id',CU.id).eq('following_id',id);
    FOLLOWS.delete(id);if(btn){btn.textContent='متابعة +';btn.classList.remove('ing');}
  }else{
    await db.from('follows').insert({follower_id:CU.id,following_id:id});
    FOLLOWS.add(id);if(btn){btn.textContent='متابَع ✓';btn.classList.add('ing');}
    await db.from('notifications').insert({user_id:id,actor_id:CU.id,action:'تابعك'}).catch(()=>{});
  }
  renderSuggest();
}

// ══════════════════════════════════
// POSTS
// ══════════════════════════════════
function pcHTML(post){
  const p=pOf(post.user_id);
  let med='';
  if(post.image_url) med=`<div class="p-media"><img src="${post.image_url}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"/></div>`;
  else if(post.post_type==='video_long'||post.post_type==='reel') med=`<div class="p-media-placeholder"><div class="p-play">${post.post_type==='reel'?'🎬':'▶️'}</div><span style="color:rgba(255,255,255,0.6);font-size:12px;">${post.post_type==='reel'?'ريلز':'فيديو طويل'}</span></div>`;
  return`<div class="post" id="post-${post.id}">
    <div class="post-hd">${avHTML(post.user_id,42)}<div class="p-ui"><div class="p-nm">${p.full_name||'مستخدم'}</div><div class="p-hd">@${p.username||'user'} · ${tAgo(post.created_at)}</div></div></div>
    ${med}
    <div class="p-txt">${post.content}</div>
    <div class="p-acts">
      <button class="act${post.liked?' liked':''}" onclick="toggleLike('${post.id}')"><span class="act-ic">${post.liked?'❤️':'🤍'}</span><span>${post.likes_count>0?fmtN(post.likes_count):''}</span></button>
      <button class="act"><span class="act-ic">💬</span><span>${post.comments_count>0?fmtN(post.comments_count):''}</span></button>
      <button class="act" onclick="sharePost('${post.id}')"><span class="act-ic">🔁</span></button>
      ${post.user_id===CU?.id?`<button class="act" style="margin-right:auto;" onclick="deletePost('${post.id}')"><span class="act-ic">🗑️</span></button>`:''}
    </div></div>`;
}
function renderPosts(){const c=document.getElementById('posts-wrap');c.innerHTML=POSTS.length?POSTS.map(pcHTML).join(''):`<div class="empty-s"><span class="e-ic">📭</span>لا توجد منشورات بعد<br/><button class="btn-pnow" onclick="openModal()">أنشر أول منشور 🚀</button></div>`;}

async function toggleLike(id){
  const post=POSTS.find(p=>p.id===id);if(!post)return;
  if(post.liked){
    await db.from('likes').delete().eq('user_id',CU.id).eq('post_id',id);
    post.liked=false;post.likes_count=Math.max(0,(post.likes_count||1)-1);
  }else{
    await db.from('likes').insert({user_id:CU.id,post_id:id}).catch(()=>{});
    post.liked=true;post.likes_count=(post.likes_count||0)+1;
    if(post.user_id!==CU.id) db.from('notifications').insert({user_id:post.user_id,actor_id:CU.id,action:'أعجب بمنشورك'}).catch(()=>{});
  }
  await db.from('posts').update({likes_count:post.likes_count}).eq('id',id);
  renderPosts();renderMyPosts();
}

async function deletePost(id){
  if(!confirm('هل تريد حذف هذا المنشور؟'))return;
  await db.from('posts').delete().eq('id',id);
  POSTS=POSTS.filter(p=>p.id!==id);renderPosts();renderReels();renderMyPosts();
}

function sharePost(id){
  const post=POSTS.find(p=>p.id===id);
  if(navigator.share&&post) navigator.share({title:'Nexus',text:post.content}).catch(()=>{});
  else{navigator.clipboard?.writeText(post?.content||'').then(()=>alert('تم نسخ المنشور!'));}
}

// ══════════════════════════════════
// REELS
// ══════════════════════════════════
function renderReels(){
  const r=POSTS.filter(p=>p.post_type==='reel'||p.post_type==='video_long');
  const c=document.getElementById('reels-g');
  if(!r.length){c.innerHTML='<div class="empty-s" style="grid-column:span 2;"><span class="e-ic">🎬</span>لا توجد فيديوهات بعد</div>';return;}
  c.innerHTML=r.map(post=>{
    const p=pOf(post.user_id);
    const th=post.image_url?`<img src="${post.image_url}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:0;"/><div class="reel-overlay"><div class="p-play" style="width:44px;height:44px;font-size:18px;">▶️</div></div>`:
      `<div class="p-play" style="width:44px;height:44px;font-size:18px;">${post.post_type==='reel'?'🎬':'▶️'}</div>`;
    return`<div class="reel-c"><div class="reel-th">${th}</div><div class="reel-inf"><div class="reel-tt">${post.content.slice(0,46)}${post.content.length>46?'...':''}</div><div class="reel-mt">❤️ ${fmtN(post.likes_count||0)} · ${p.full_name||''}</div></div></div>`;
  }).join('');
}

// ══════════════════════════════════
// MESSAGES (AI-powered)
// ══════════════════════════════════
function renderMsgList(){
  const c=document.getElementById('msg-list');
  const users=Object.values(PROFS).filter(p=>p.id!==CU?.id);
  if(!users.length){c.innerHTML='<div class="empty-s"><span class="e-ic">💬</span>لا يوجد مستخدمون آخرون بعد</div>';return;}
  c.innerHTML=users.map(p=>{
    const ms=MSGS[p.id]||[];const last=ms[ms.length-1];
    const av=p.avatar_url?`<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;"/>`:`${(p.full_name||'م')[0]}`;
    return`<div class="msg-it" onclick="openChat('${p.id}')">
      <div class="m-aw"><div class="m-av" style="background:${p.avatar_url?'transparent':p.avatar_color||'#7C3AED'}">${av}</div><div class="odot"></div></div>
      <div style="flex:1;"><div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span style="color:#fff;font-weight:700;font-size:14px;">${p.full_name||''}</span><span style="color:var(--sub);font-size:12px;">${last?.time||''}</span></div><div style="color:var(--sub);font-size:13px;">${last?.text?.slice(0,36)||'ابدأ محادثة...'}</div></div>
    </div>`;
  }).join('');
}

function openChat(id){
  ACH=id;const p=pOf(id);
  document.getElementById('msg-list-v').style.display='none';
  const cv=document.getElementById('chat-v');cv.classList.add('on');
  const ca=document.getElementById('c-av');
  if(p.avatar_url){ca.innerHTML=`<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;"/>`;ca.style.background='none';}
  else{ca.textContent=(p.full_name||'م')[0];ca.style.background=p.avatar_color||'#7C3AED';}
  document.getElementById('c-nm').textContent=p.full_name||'';
  renderChatMsgs();
}
function closeChat(){ACH=null;document.getElementById('msg-list-v').style.display='block';document.getElementById('chat-v').classList.remove('on');}
function renderChatMsgs(){
  const ms=MSGS[ACH]||[];
  const c=document.getElementById('ch-msgs');
  c.innerHTML=ms.map(m=>`<div class="${m.from==='me'?'bw-me':'bw-th'}"><div class="bbl ${m.from==='me'?'b-me':'b-th'}"><div class="bbl-txt">${m.text}</div><div class="bbl-t">${m.time}</div></div></div>`).join('');
  c.scrollTop=c.scrollHeight;
}
async function sendMsg(){
  const inp=document.getElementById('ch-inp'),text=inp.value.trim();
  if(!text||!ACH)return;
  if(!MSGS[ACH])MSGS[ACH]=[];
  MSGS[ACH].push({from:'me',text,time:nowT()});
  inp.value='';renderChatMsgs();renderMsgList();
  const c=document.getElementById('ch-msgs');
  const t=document.createElement('div');t.className='bw-th';
  t.innerHTML='<div class="bbl b-th" style="color:rgba(255,255,255,0.4);">يكتب...</div>';
  c.appendChild(t);c.scrollTop=c.scrollHeight;
  try{
    const p=pOf(ACH);
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:`أنت ${p.full_name||'صديق'}، رد بشكل طبيعي وودود جداً باللغة العربية العامية في جملة أو جملتين: "${text}"`}]})});
    const data=await res.json();t.remove();
    MSGS[ACH].push({from:'them',text:data.content?.[0]?.text||'😊',time:nowT()});
    renderChatMsgs();renderMsgList();
  }catch{t.remove();}
}

// ══════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════
function renderNotifs(){
  const c=document.getElementById('not-list');
  if(!NOTIFS.length){c.innerHTML='<div class="empty-s"><span class="e-ic">🔔</span>لا توجد إشعارات بعد</div>';return;}
  c.innerHTML=NOTIFS.map(n=>{
    const p=pOf(n.actor_id);
    const av=p.avatar_url?`<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;"/>`:`${(p.full_name||'م')[0]}`;
    return`<div class="not-it${n.is_read?'':' unr'}">
      <div class="not-av" style="background:${p.avatar_url?'transparent':p.avatar_color||'#7C3AED'}">${av}</div>
      <div style="flex:1;"><span style="color:#fff;font-weight:700;">${p.full_name||''}</span> <span style="color:rgba(255,255,255,0.7);">${n.action}</span><div style="color:var(--sub);font-size:12px;margin-top:3px;">${tAgo(n.created_at)}</div></div>
      ${n.is_read?'':'<div class="u-dot"></div>'}
    </div>`;
  }).join('');
}
async function markRead(){
  await db.from('notifications').update({is_read:true}).eq('user_id',CU.id).eq('is_read',false).catch(()=>{});
  NOTIFS.forEach(n=>n.is_read=true);renderNotifs();updateBdg();
}
function updateBdg(){const u=NOTIFS.filter(n=>!n.is_read).length;const b=document.getElementById('n-bdg');b.textContent=u||'';b.style.display=u?'block':'none';}

// ══════════════════════════════════
// PROFILE
// ══════════════════════════════════
function renderProf(){
  if(!CP)return;
  const mp=POSTS.filter(p=>p.user_id===CU?.id);
  updMAv();
  document.getElementById('p-nm').textContent=CP.full_name||'';
  document.getElementById('p-hn').textContent='@'+(CP.username||'');
  document.getElementById('p-bio').textContent=CP.bio||'لا توجد نبذة بعد';
  document.getElementById('s-p').textContent=mp.length;
  document.getElementById('s-f').textContent=CP.followers_count||0;
  document.getElementById('s-g').textContent=FOLLOWS.size;
  document.getElementById('mp-t').textContent=`منشوراتي (${mp.length})`;
  renderMyPosts();loadNotifs();
}
function renderMyPosts(){
  const mp=POSTS.filter(p=>p.user_id===CU?.id);
  const c=document.getElementById('mp-wrap');
  c.innerHTML=mp.length?mp.map(pcHTML).join(''):'<div class="empty-s"><span class="e-ic">📝</span>لم تنشر شيئاً بعد<br/><button class="btn-pnow" onclick="openModal()">أنشر الآن 🚀</button></div>';
}
function toggleEdit(s){document.getElementById('p-view').style.display=s?'none':'block';document.getElementById('p-edit').style.display=s?'block':'none';if(s){document.getElementById('e-nm').value=CP.full_name||'';document.getElementById('e-un').value=CP.username||'';document.getElementById('e-bi').value=CP.bio||'';}}
async function saveProf(){
  const nm=document.getElementById('e-nm').value.trim(),un=document.getElementById('e-un').value.trim(),bi=document.getElementById('e-bi').value.trim();
  if(!nm||!un){alert('الاسم واسم المستخدم مطلوبان');return;}
  const{error}=await db.from('profiles').update({full_name:nm,username:un,bio:bi}).eq('id',CU.id);
  if(error){alert('خطأ: '+error.message);return;}
  CP={...CP,full_name:nm,username:un,bio:bi};PROFS[CU.id]=CP;
  toggleEdit(0);renderProf();updMAv();
}
function pickAvatar(){document.getElementById('av-pick').click();}
async function uploadAvatar(inp){
  const file=inp.files[0];if(!file)return;
  const ext=file.name.split('.').pop();
  const path=`avatars/${CU.id}.${ext}`;
  const{error}=await db.storage.from('nexus-media').upload(path,file,{upsert:true});
  if(error){alert('خطأ في رفع الصورة: '+error.message);return;}
  const{data:urlData}=db.storage.from('nexus-media').getPublicUrl(path);
  const url=urlData.publicUrl+'?t='+Date.now();
  await db.from('profiles').update({avatar_url:url}).eq('id',CU.id);
  CP={...CP,avatar_url:url};PROFS[CU.id]=CP;
  updMAv();renderProf();renderStories();renderSuggest();renderMsgList();
}

// ══════════════════════════════════
// POST MODAL
// ══════════════════════════════════
function openModal(){document.getElementById('p-ov').classList.add('on');document.getElementById('p-ta').focus();}
function closeModal(){document.getElementById('p-ov').classList.remove('on');document.getElementById('p-ta').value='';postImgFile=null;document.getElementById('img-prev').style.display='none';document.getElementById('img-pick-row').style.display='none';document.getElementById('up-bar').style.width='0';}
function setPT(t,btn){curPT=t;document.querySelectorAll('.pt-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('img-pick-row').style.display=(t==='image'||t==='reel'||t==='video_long')?'flex':'none';}
function previewPostImg(inp){
  const file=inp.files[0];if(!file)return;
  postImgFile=file;
  const reader=new FileReader();
  reader.onload=e=>{document.getElementById('img-prev-img').src=e.target.result;document.getElementById('img-prev').style.display='block';};
  reader.readAsDataURL(file);
}

async function publishPost(){
  const text=document.getElementById('p-ta').value.trim();if(!text){alert('اكتب شيئاً أولاً!');return;}
  const btn=document.getElementById('pub-btn');btn.disabled=true;btn.textContent='🤖 يحسّن المنشور...';
  const bar=document.getElementById('up-bar');

  // AI enhance
  let enhanced=text;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:`أنت مساعد لشبكة اجتماعية. حسّن هذا المنشور وأضف إيموجي مناسبة. المنشور: "${text}". رد بـ JSON فقط بدون backticks: {"enhanced":"النص المحسّن"}`}]})});
    const data=await res.json();
    try{enhanced=JSON.parse(data.content?.[0]?.text||'{}').enhanced||text;}catch{}
  }catch{}

  // upload image if any
  let imageUrl=null;
  if(postImgFile){
    btn.textContent='📤 يرفع الصورة...';bar.style.width='40%';
    const ext=postImgFile.name.split('.').pop();
    const path=`posts/${CU.id}/${Date.now()}.${ext}`;
    const{data:upData,error:upErr}=await db.storage.from('nexus-media').upload(path,postImgFile);
    if(!upErr){const{data:u}=db.storage.from('nexus-media').getPublicUrl(path);imageUrl=u.publicUrl;}
    bar.style.width='80%';
  }

  btn.textContent='💾 يحفظ...';bar.style.width='90%';
  const{data:np,error}=await db.from('posts').insert({user_id:CU.id,content:enhanced,post_type:curPT,image_url:imageUrl,likes_count:0,comments_count:0,views_count:0}).select().single();
  bar.style.width='100%';
  btn.disabled=false;btn.textContent='نشر الآن ✨';
  if(error){alert('خطأ في النشر: '+error.message);bar.style.width='0';return;}
  POSTS.unshift({...np,liked:false});
  closeModal();renderPosts();renderReels();renderMyPosts();
}
</script>
